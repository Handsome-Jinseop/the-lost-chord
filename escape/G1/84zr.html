<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>보물찾기 문제</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: auto;
      background-color: #f9f9f9;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
    }
    #hint {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #dff0d8;
      border: 1px solid #c3e6cb;
      border-radius: 5px;
      color: #3c763d;
    }
    #feedback {
      color: red;
      margin-top: 10px;
    }
    input[type="text"] {
      padding: 10px;
      width: 60%;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>문제 4</h1>
  <p>모세가 시내산에서 40일을 있는 동안 백성들은 참지 못하고 금으로 된 동물 모양을 만들어 하나님이라 선포하고 그 앞에 제단을 쌓아 번제와 화목제를 드렸습니다. 어떤 동물이었을까요?</p>

  <input type="text" id="answerInput" placeholder="정답을 입력하세요">
  <br>
  <button onclick="checkAnswer()">제출</button>

  <div id="feedback"></div>

  <div id="hint">
    🎉 정답입니다!<br>
    👉 힌트: "'진짜'라는 말은 거짓말이다."
  </div>

  <script>
    function checkAnswer() {
      const userAnswer = document.getElementById('answerInput').value.trim();
      const correctAnswer = "송아지"; // ← 원하는 정답으로 수정 가능

      if (userAnswer === correctAnswer) {
        document.getElementById('hint').style.display = 'block';
        document.getElementById('feedback').innerText = '';
      } else {
        document.getElementById('feedback').innerText = '정답이 아닙니다. 다시 시도해보세요!';
        document.getElementById('hint').style.display = 'none';
      }
    }
  </script>

</body>
</html>
