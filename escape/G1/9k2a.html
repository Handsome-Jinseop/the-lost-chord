<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>다음 단계</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f3e4c8;
}

/* 문제 영역 */
.content {
  padding: 20px;
}

/* blocker */
.blocker {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  text-align: center;
  padding: 20px;
}

.hidden {
  display: none;
}

.button {
  margin-top: 20px;
  padding: 12px 20px;
  background: #fff;
  color: black;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔒 blocker -->
<div id="blocker" class="blocker">
  <h2>📍 지정된 장소로 이동하세요</h2>
  <p>XX 지역에 도착해야 다음 기억이 열립니다.</p>

  <button class="button" onclick="checkLocation()">위치 확인</button>

  <p id="status"></p>
</div>

<!-- 🔓 실제 콘텐츠 -->
<div class="content">
  <h2>다음 문제</h2>
  <p>여기에 문제를 넣으면 됨</p>
</div>

<script>
// 🎯 목표 좌표 (여기 바꾸면 됨)
const TARGET_LAT = 38.634152;   // 예시
const TARGET_LNG = 127.122032;  // 예시

// 허용 거리 (미터)
const ALLOW_DISTANCE = 50;

// 거리 계산 함수 (Haversine)
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (deg) => deg * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

// 📍 위치 확인
function checkLocation() {
  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "GPS를 지원하지 않는 기기입니다.";
    return;
  }

  status.innerText = "위치 확인 중...";

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const userLat = pos.coords.latitude;
      const userLng = pos.coords.longitude;

      const distance = getDistance(userLat, userLng, TARGET_LAT, TARGET_LNG);

      if (distance <= ALLOW_DISTANCE) {
        document.getElementById("blocker").classList.add("hidden");
      } else {
        status.innerText = `목표 지점과 ${Math.round(distance)}m 떨어져 있습니다.`;
      }
    },
    () => {
      status.innerText = "위치 권한을 허용해주세요.";
    }
  );
}
</script>

</body>
</html>
