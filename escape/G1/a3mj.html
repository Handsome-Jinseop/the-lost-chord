<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>보물찾기 문제</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: auto;
      background-color: #f9f9f9;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
    }
    #hint {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #dff0d8;
      border: 1px solid #c3e6cb;
      border-radius: 5px;
      color: #3c763d;
    }
    #feedback {
      color: red;
      margin-top: 10px;
    }
    input[type="text"] {
      padding: 10px;
      width: 60%;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>문제 6</h1>
  <p>모세가 하나님께서 친히 새겨주신 십계명 돌판을 가지고 시내산에서 내려왔을 때 사람들은 우상을 만들어 제사를 드리고 있었습니다. 모세는 이에 가담한 사람들 약 3천명 가량을 칼로 죽이게 하였는데 한 지파 사람들이 나와 자기 형제, 친구, 이웃들을 죽였습니다. 이 사건으로 그들은 하나님께 헌신함으로 복을 받아 대대로 하나님을 섬기는 임무를 맡게 되었습니다. 모세와 아론도 속한 이 지파의 이름은 무엇인가요?('지파'라는 글씨 생략)</p>

  <input type="text" id="answerInput" placeholder="정답을 입력하세요">
  <br>
  <button onclick="checkAnswer()">제출</button>

  <div id="feedback"></div>

  <div id="hint">
    🎉 정답입니다!<br>
    👉 힌트: "번호는 반시계방향이다."
  </div>

  <script>
    function checkAnswer() {
      const userAnswer = document.getElementById('answerInput').value.trim();
      const correctAnswer = "레위"; // ← 원하는 정답으로 수정 가능

      if (userAnswer === correctAnswer) {
        document.getElementById('hint').style.display = 'block';
        document.getElementById('feedback').innerText = '';
      } else {
        document.getElementById('feedback').innerText = '정답이 아닙니다. 다시 시도해보세요!';
        document.getElementById('hint').style.display = 'none';
      }
    }
  </script>

</body>
</html>
