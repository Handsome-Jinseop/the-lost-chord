<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>깨진 언어의 코드</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #5a4633;
  font-family: 'Gaegu', cursive;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 20px;
}

.paper {
  background: #f3e4c8;
  padding: 30px 20px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  position: relative;
}

/* 종이 질감 */
.paper::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  opacity: 0.3;
  border-radius: 10px;
}

.content {
  position: relative;
  z-index: 1;
}

/* 텍스트 */
.title {
  font-size: 26px;
  margin-bottom: 20px;
}

.desc {
  font-size: 18px;
  line-height: 1.5;
  margin-bottom: 30px;
}

/* 문제 박스 */
.problem-box {
  border: 2px solid rgba(0,0,0,0.2);
  padding: 15px;
  margin-bottom: 20px;
  font-size: 18px;
}

/* 입력창 */
.input {
  width: 100%;
  padding: 12px;
  border: none;
  border-bottom: 2px solid #6b5a45;
  background: transparent;
  font-size: 20px;
  font-family: 'Gaegu', cursive;
  outline: none;
  margin-bottom: 20px;
}

/* 버튼 */
.button {
  width: 100%;
  padding: 14px;
  background: #6b5a45;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 0 #4a3b2d;
}

.button:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #4a3b2d;
}

/* 결과 */
.result {
  margin-top: 20px;
  font-size: 20px;
  text-align: center;
  min-height: 30px;
}

.success {
  color: green;
}

.fail {
  color: red;
}
</style>
</head>

<body>

<div class="container">
  <div class="paper">
    <div class="content">

      <div class="title">깨진 언어의 코드</div>

      <div class="desc">
        의미를 잃어버린 말들.<br>
        그러나 완전히 사라진 것은 아니다.
      </div>

      <div class="problem-box">
        ㄱ ㄱ ㅇ ㅂ ㅎ ㅂ ㅇ ㅅ ㄴ = ?
      </div>

      <input class="input" id="answer" placeholder="정답을 입력하세요..." />

      <button class="button" onclick="checkAnswer()">해독하기</button>

      <div class="result" id="result"></div>

    </div>
  </div>
</div>

<script>
function checkAnswer() {
  const input = document.getElementById("answer").value.trim();
  const result = document.getElementById("result");

  const correct = "기억해보세요"; // ← 여기 정답 바꾸면 됨

  if (input === correct) {
    result.innerHTML = "정답입니다. 기억이 이어졌습니다.";
    result.className = "result success";
  } else {
    result.innerHTML = "아직 흐름이 맞지 않습니다...";
    result.className = "result fail";
  }
}
</script>

</body>
</html>
