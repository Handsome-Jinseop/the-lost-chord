<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조 선택</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #5a4633;
  font-family: 'Gaegu', cursive;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  line-height: 1.2;
  margin-bottom: 20px;
  color: #3b2f25;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.paper {
  background: #f3e4c8;
  padding: 30px 20px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
  position: relative;
}

.paper::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  opacity: 0.3;
  border-radius: 10px;
}

.content {
  position: relative;
  z-index: 1;
}

.desc {
  font-size: 18px;
  margin-bottom: 30px;
}

/* 입력창 */
.input {
  width: 100%;
  padding: 12px;
  font-size: 22px;
  border: none;
  border-bottom: 2px solid #6b5a45;
  background: transparent;
  text-align: center;
  outline: none;
  margin-bottom: 25px;
}

/* 버튼 */
.button {
  width: 100%;
  padding: 14px;
  background: #6b5a45;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 4px 0 #4a3b2d;
}

.button:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #4a3b2d;
}

.error {
  margin-top: 15px;
  color: red;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <div class="paper">
    <div class="content">

      <div class="title">당신의 조를<br>입력하세요</div>

      <div class="desc">
        조별로 다른 경로가 준비되어있습니다.<br>숫자만 입력하세요.
      </div>

      <input 
        type="number" 
        id="group" 
        class="input" 
        placeholder="예: 1"
      />

      <button class="button" onclick="goNext()">입장하기</button>

      <div id="error" class="error"></div>

    </div>
  </div>
</div>

<script>
function goNext() {
  const group = document.getElementById("group").value.trim();
  const error = document.getElementById("error");

  if (!group || group <= 0) {
    error.innerText = "올바른 조 번호를 입력하세요.";
    return;
  }

  // 👉 이동 경로
  location.href = `/the-lost-chord/escape/G${group}/7vdu.html`;
}
</script>

</body>
</html>
