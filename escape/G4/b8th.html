<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>거꾸로 흐르는 선율</title>

  <link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"> 
</head>

<body>

<!-- 🔒 blocker -->
<div id="blocker" class="blocker">
  <h2 id="pin">📍 지정된 장소로 이동하세요</h2>

  <img src="../img/boat.jpg" class="location-image">

  <p>이 장소에 도착하면 다음 문제가 열립니다.</p>

  <button class="location_button" onclick="checkLocation('boat')">위치 확인</button>

  <p id="status"></p>
</div>

<!-- 🔓 실제 콘텐츠 -->
<div class="paper">
    <div class="content">

      <div class="title">거꾸로 흐르는 선율</div>

      <div class="desc">
        무언가 어긋나 있다.<br>
        흐름이 자연스럽지 않다.<br>
        하지만 방향이 바뀌면<br>
        전혀 다른 모습이 드러난다.<br>
        <p style="opacity: 0.3;">힌트 : 곡명</p>
      </div>

      <div class="problem-box">
        <div class="audio-player">
          <button id="audioBtn" class="audio-button" onclick="toggleAudio()">▶</button>

          <div class="progress-container" onclick="seek(event)">
            <div class="progress" id="progress"></div>
          </div>

          <div class="time">
            <span id="current">0:00</span> / <span id="duration">0:00</span>
          </div>

          <audio id="audio" src="../audio/reverse.mp3"></audio>
        </div>
      </div>

      <input class="input" id="answer" placeholder="정답을 입력하세요..." />

      <button class="button" onclick="checkAnswer('야곱의 축복','../d129.html')">해독하기</button>

      <div class="result" id="result"></div>

  </div>
</div>
<script src="../js/main.js"></script>
<script src="../js/location.js"></script>

</body>
</html>
