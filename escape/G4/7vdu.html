<!DOCTYPE html>
<html lang="ko">
<head>

<body>

<div class="container">
  <div class="paper">
    <div class="content">

      <div class="title">깨진 언어의 코드</div>

      <div class="desc">
        의미를 잃어버린 말들.<br>
        형태만 남은 채 흩어져 있다.<br>
        그러나 완전히 무너진 것은 아니다.<br>
        어딘가에 흐름이 남아 있다.
      </div>

      <div class="problem-box">
        ㄴ ㅈㄴ ㅇㅅㄹ = 214<br>
        ㅈ ㅎㄴㄴ ㅈㅇㅅ ㅁㄷㅅㄱ = 42<br>
        ㅎㄴㅇ ㅇㅇㅇ ㅈ ㅂㄷ ㅇㄹ = 294<br>
        ㄱ ㄱㅇ ㅂㅎ ㅂㅇㅅㄴ = ?
      </div>

      <input class="input" id="answer" placeholder="정답을 입력하세요..." />

      <button class="button" onclick="checkAnswer('303',)">해독하기</button>

      <div class="result" id="result"></div>

    </div>
  </div>
</div>
